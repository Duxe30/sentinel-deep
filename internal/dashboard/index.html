<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel-Pi v3.0 — Deep Inspector</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'SF Mono', Consolas, Monaco, monospace;
  background: #0d1117;
  color: #c9d1d9;
  font-size: 13px;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: #161b22;
  border-bottom: 1px solid #30363d;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-size: 15px;
  font-weight: bold;
  color: #58a6ff;
}
.logo::before { content: "🛡️ "; }
.status {
  display: flex;
  gap: 16px;
  font-size: 12px;
}
.status span {
  padding: 3px 8px;
  border-radius: 3px;
  background: #21262d;
}
.live::before {
  content: "● ";
  color: #3fb950;
  animation: blink 1.5s infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }

.toolbar {
  background: #161b22;
  padding: 8px 16px;
  display: flex;
  gap: 8px;
  border-bottom: 1px solid #30363d;
}
.toolbar button {
  background: #21262d;
  color: #c9d1d9;
  border: 1px solid #30363d;
  padding: 5px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
}
.toolbar button:hover { background: #30363d; }
.toolbar button.active {
  background: #1f6feb;
  border-color: #1f6feb;
}
.filter {
  flex: 1;
  background: #0d1117;
  color: #c9d1d9;
  border: 1px solid #30363d;
  padding: 5px 10px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 12px;
}

main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.packet-list {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
}
.packet-list table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.packet-list th {
  background: #161b22;
  position: sticky;
  top: 0;
  padding: 6px 8px;
  text-align: left;
  border-bottom: 1px solid #30363d;
  font-weight: 600;
  color: #8b949e;
}
.packet-list td {
  padding: 3px 8px;
  border-bottom: 1px solid #21262d;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.packet-list tr { cursor: pointer; }
.packet-list tr:hover { background: #161b22; }
.packet-list tr.selected { background: #1f6feb33; }
.packet-list tr.sev-warn { background: #332b00; }
.packet-list tr.sev-high { background: #3d1a1a; }
.packet-list tr.sev-critical { background: #4d0000; color: #ffaaaa; font-weight: bold; }

.num { color: #8b949e; width: 50px; text-align: right; }
.time { color: #7ee787; width: 80px; }
.ip { color: #79c0ff; }
.proto { color: #d2a8ff; font-weight: 500; }
.app { color: #ffa657; font-weight: 500; }
.attack { color: #ff7b72; font-weight: bold; }

.details {
  width: 420px;
  background: #161b22;
  border-left: 1px solid #30363d;
  overflow-y: auto;
  padding: 12px;
}
.details h3 {
  color: #58a6ff;
  font-size: 13px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #30363d;
}
.details .section {
  margin-bottom: 14px;
}
.details .section .label {
  color: #8b949e;
  font-size: 11px;
  text-transform: uppercase;
}
.details .kv {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 4px 8px;
  margin-top: 4px;
  font-size: 12px;
}
.details .kv .k { color: #8b949e; }
.details .kv .v { color: #c9d1d9; word-break: break-all; }

.alerts {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 420px;
  height: 180px;
  background: #0d1117;
  border-top: 1px solid #30363d;
  overflow-y: auto;
  display: none;
}
.alerts.show { display: block; }
.alerts h3 {
  background: #3d1a1a;
  color: #ff7b72;
  padding: 6px 12px;
  position: sticky;
  top: 0;
}
.alert-item {
  padding: 6px 12px;
  border-bottom: 1px solid #21262d;
  font-size: 12px;
}
.alert-item .time { color: #8b949e; }
.alert-item .type { color: #ff7b72; font-weight: bold; }

.bar {
  display: inline-block;
  width: 60px;
  height: 8px;
  background: #21262d;
  border-radius: 2px;
  overflow: hidden;
  vertical-align: middle;
  margin-right: 4px;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #3fb950, #f0b429, #f85149);
}
</style>
</head>
<body>

<header>
  <div class="logo">Sentinel-Pi v3.0 — Deep Inspector</div>
  <div class="status">
    <span class="live">LIVE</span>
    <span id="stat-pkts">Packets: 0</span>
    <span id="stat-flows">Flows: 0</span>
    <span id="stat-alerts">Alerts: 0</span>
    <span id="stat-ram">RAM: —</span>
    <span id="stat-cpu">CPU: —</span>
  </div>
</header>

<div class="toolbar">
  <button id="btn-all" class="active" data-f="">All</button>
  <button data-f="TCP">TCP</button>
  <button data-f="UDP">UDP</button>
  <button data-f="DNS">DNS</button>
  <button data-f="HTTP">HTTP</button>
  <button data-f="TLS">TLS</button>
  <button data-f="ARP">ARP</button>
  <button data-f="ICMP">ICMP</button>
  <button id="btn-alerts">⚠️ Alerts</button>
  <input class="filter" id="filter" placeholder="Filter: src:192.168.1.5 port:443 proto:HTTP">
  <button id="btn-pause">⏸ Pause</button>
  <button id="btn-clear">🗑 Clear</button>
</div>

<main>
  <div class="packet-list">
    <table>
      <thead>
        <tr>
          <th class="num">No.</th>
          <th class="time">Time</th>
          <th>Source</th>
          <th>Destination</th>
          <th>Proto</th>
          <th style="width:60px">Len</th>
          <th>Info</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="details" id="details">
    <h3>Packet Details</h3>
    <div style="color:#8b949e;font-size:12px">Select a packet to inspect</div>
  </div>
</main>

<div class="alerts" id="alerts">
  <h3>🚨 Threat Alerts</h3>
  <div id="alert-list"></div>
</div>

<script>
const tbody = document.getElementById('tbody');
const details = document.getElementById('details');
const filterInput = document.getElementById('filter');
const alertsPane = document.getElementById('alerts');
const alertList = document.getElementById('alert-list');

let packets = [];
let filteredBy = '';
let paused = false;
let selectedNum = null;
const maxRows = 2000;

// ── Filter toolbar ────────────────────────────────
document.querySelectorAll('.toolbar button[data-f]').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.toolbar button[data-f]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filteredBy = btn.dataset.f;
    render();
  };
});

document.getElementById('btn-pause').onclick = (e) => {
  paused = !paused;
  e.target.textContent = paused ? '▶ Resume' : '⏸ Pause';
};
document.getElementById('btn-clear').onclick = () => {
  packets = [];
  render();
};
document.getElementById('btn-alerts').onclick = () => {
  alertsPane.classList.toggle('show');
};
filterInput.oninput = () => render();

// ── Rendering ─────────────────────────────────────
function matchFilter(p) {
  if (filteredBy) {
    const proto = (p.proto || '') + ' ' + (p.app || '');
    if (!proto.includes(filteredBy)) return false;
  }
  const q = filterInput.value.toLowerCase();
  if (!q) return true;
  const hay = JSON.stringify(p).toLowerCase();
  return hay.includes(q);
}

function render() {
  const rows = packets.filter(matchFilter).slice(-maxRows);
  tbody.innerHTML = '';
  for (const p of rows) {
    const tr = document.createElement('tr');
    tr.dataset.num = p.num;
    if (p.sev) tr.className = 'sev-' + p.sev;
    if (p.num === selectedNum) tr.classList.add('selected');
    tr.innerHTML = `
      <td class="num">${p.num}</td>
      <td class="time">${p.ts.toFixed(3)}</td>
      <td class="ip">${p.src || ''}${p.sport ? ':' + p.sport : ''}</td>
      <td class="ip">${p.dst || ''}${p.dport ? ':' + p.dport : ''}</td>
      <td><span class="proto">${p.proto || ''}</span> ${p.app ? '<span class="app">' + p.app + '</span>' : ''}</td>
      <td>${p.len}</td>
      <td>${escapeHTML(p.info || '')}${p.attack ? ' <span class="attack">[' + p.attack.toUpperCase() + ']</span>' : ''}${p.intel ? ' <span class="attack">[INTEL: ' + escapeHTML(p.intel) + ']</span>' : ''}</td>
    `;
    tr.onclick = () => selectPacket(p);
    tbody.appendChild(tr);
  }
  document.getElementById('stat-pkts').textContent = `Packets: ${packets.length}`;
}

function selectPacket(p) {
  selectedNum = p.num;
  document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('selected'));
  const row = document.querySelector(`#tbody tr[data-num="${p.num}"]`);
  if (row) row.classList.add('selected');

  let html = `
    <h3>Packet #${p.num} — ${p.len} bytes</h3>
    <div class="section">
      <div class="label">Timestamp</div>
      <div class="kv"><span class="k">t</span><span class="v">+${p.ts.toFixed(6)} s</span></div>
    </div>
    <div class="section">
      <div class="label">Layer 3 — ${p.proto || 'n/a'}</div>
      <div class="kv">
        <span class="k">Source</span><span class="v">${p.src || ''}${p.sport ? ':' + p.sport : ''}</span>
        <span class="k">Destination</span><span class="v">${p.dst || ''}${p.dport ? ':' + p.dport : ''}</span>
        ${p.flags ? `<span class="k">TCP Flags</span><span class="v">${p.flags}</span>` : ''}
      </div>
    </div>
  `;

  if (p.app) {
    html += `
      <div class="section">
        <div class="label">Application — ${p.app}</div>
        <div class="kv"><span class="k">Info</span><span class="v">${escapeHTML(p.info || '')}</span></div>
      </div>
    `;
  }

  if (p.ml) {
    const pct = (p.ml * 100).toFixed(1);
    html += `
      <div class="section">
        <div class="label">🧠 ML Prediction</div>
        <div class="kv">
          <span class="k">Score</span><span class="v"><span class="bar"><span class="bar-fill" style="width:${pct}%"></span></span>${pct}%</span>
          ${p.attack ? `<span class="k">Attack Type</span><span class="v attack">${p.attack}</span>` : ''}
        </div>
      </div>
    `;
  }

  if (p.intel) {
    html += `
      <div class="section">
        <div class="label">🌐 Threat Intelligence</div>
        <div class="kv"><span class="k">Source</span><span class="v attack">${escapeHTML(p.intel)}</span></div>
      </div>
    `;
  }

  details.innerHTML = html;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── SSE stream ─────────────────────────────────────
const stream = new EventSource('/api/stream');
stream.onmessage = e => {
  if (paused) return;
  try {
    const msg = JSON.parse(e.data);
    if (msg.type === 'packet') {
      packets.push(msg.data);
      if (packets.length > 10000) packets = packets.slice(-5000);
      render();
      // Auto-scroll
      tbody.parentElement.scrollTop = tbody.parentElement.scrollHeight;
    } else if (msg.type === 'alert') {
      addAlert(msg.data);
    }
  } catch {}
};

function addAlert(a) {
  const el = document.createElement('div');
  el.className = 'alert-item';
  el.innerHTML = `
    <span class="time">${new Date(a.time).toLocaleTimeString()}</span>
    • <span class="type">${a.type}</span>
    • ${a.src} → ${a.dst}
    • score ${(a.score * 100).toFixed(1)}%
    • ${escapeHTML(a.details || '')}
  `;
  alertList.prepend(el);
  document.getElementById('stat-alerts').textContent = `Alerts: ${alertList.children.length}`;
}

// ── Stats polling ──────────────────────────────────
async function pollStats() {
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    if (s.flows !== undefined) document.getElementById('stat-flows').textContent = `Flows: ${s.flows}`;
    if (s.ram_mb !== undefined) document.getElementById('stat-ram').textContent = `RAM: ${s.ram_mb} MB`;
    if (s.cpu_pct !== undefined) document.getElementById('stat-cpu').textContent = `CPU: ${s.cpu_pct}%`;
  } catch {}
}
setInterval(pollStats, 2000);
pollStats();
</script>
</body>
</html>
